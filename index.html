<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Finder | by kejcpi</title>
    <style>
        :root {
            --bg: #050505;              
            --panel: rgba(15, 15, 15, 0.85);          
            --theme: #0055FF;
            --theme-rgb: 0, 85, 255; 
            --theme-glow: rgba(0, 85, 255, 0.4);
            --text: #ffffff;
            --text-dim: #888;
            --gold: #ffcc00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background-fx {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, var(--theme-glow) 0px, transparent 60%),
                radial-gradient(at 100% 100%, var(--theme-glow) 0px, transparent 60%),
                radial-gradient(at 50% 50%, rgba(0,0,0,1) 0px, transparent 100%);
            background-attachment: fixed;
        }

        .wrapper { width: 100%; max-width: 1300px; position: relative; padding-bottom: 50px; }

        .system-status {
            position: absolute; top: 0; left: 0;
            display: flex; flex-direction: column; gap: 8px;
            padding: 10px 15px; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); border: 1px solid var(--theme); 
            box-shadow: 0 0 10px var(--theme-glow); border-radius: 8px; z-index: 200;
        }
        .status-item { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; font-weight: bold; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .dot.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .status-label { color: var(--theme); text-transform: uppercase; }

        .theme-panel {
            position: absolute; top: 0; right: 0;
            display: flex; align-items: center; gap: 10px;
            padding: 8px 15px; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); border: 1px solid var(--theme);
            border-radius: 8px; box-shadow: 0 0 15px var(--theme-glow);
            z-index: 200;
        }
        .color-preview { width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff; background-color: var(--theme); position: relative; cursor: pointer; }
        #themePicker { position: absolute; top: -10px; left: -10px; width: 50px; height: 50px; opacity: 0; cursor: pointer; }

        header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        h1 { 
            font-size: 3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; 
            background: linear-gradient(to bottom, #fff 40%, #999 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .controls { 
            background: rgba(15, 15, 15, 0.6); backdrop-filter: blur(15px); padding: 25px; 
            border-radius: 12px; display: flex; flex-wrap: wrap; gap: 20px; 
            justify-content: center; border: 1px solid rgba(255, 255, 255, 0.08); margin-bottom: 20px; 
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 180px; }
        label { font-size: 0.7rem; color: var(--theme); font-weight: bold; text-transform: uppercase; }
        input, select { 
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: white; 
            padding: 14px; border-radius: 8px; outline: none; transition: 0.3s; 
        }
        input:focus { border-color: var(--theme); box-shadow: 0 0 10px var(--theme-glow); }
        
        .btn-group button { 
            padding: 12px 25px; background: rgba(0,0,0,0.4); border: 1px solid var(--theme); 
            color: var(--theme); border-radius: 8px; cursor: pointer; font-weight: bold; 
            text-transform: uppercase; transition: 0.3s; height: 48px;
        }
        .btn-group button:hover, .btn-group button.active { background: var(--theme); color: #000; box-shadow: 0 0 20px var(--theme); }

        .stats-bar { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
        #counter { font-size: 2.2rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        #counter strong { color: var(--theme); text-shadow: 0 0 15px var(--theme); }

        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 20px; width: 100%; }
        
        .card { 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-left: 5px solid var(--theme); 
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 8px 20px rgba(0,0,0,0.3);
            padding: 18px 22px; border-radius: 12px; display: flex; align-items: center; gap: 15px; 
            position: relative; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); animation: fadeIn 0.4s ease forwards;
        }
        .card:hover { 
            background: linear-gradient(135deg, rgba(var(--theme-rgb), 0.2) 0%, rgba(255, 255, 255, 0.05) 100%); 
            border-color: var(--theme); transform: translateY(-5px) scale(1.02); 
            box-shadow: 0 15px 25px rgba(0,0,0,0.5), 0 0 20px var(--theme-glow);
        }

        .id-box { 
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: var(--theme); font-weight: bold; padding: 6px 12px; 
            border-radius: 8px; font-family: monospace; font-size: 1.1rem;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .nick-txt { 
            flex: 1; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; 
            white-space: nowrap; font-size: 1.15rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
        }

        .fav-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.2); 
            font-size: 1.5rem; cursor: pointer; transition: 0.3s;
        }
        .fav-btn:hover { transform: scale(1.2); }
        .fav-btn.active { color: var(--gold); filter: drop-shadow(0 0 5px rgba(255, 204, 0, 0.5)); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .hidden-input { display: none; }
    </style>
</head>
<body>

<div class="background-fx"></div>

<div class="wrapper">
    <div class="system-status">
        <div class="status-item"><div class="dot online"></div><span class="status-label">FiveM:</span> <span>ONLINE</span></div>
        <div class="status-item"><div class="dot online"></div><span class="status-label">Steam:</span> <span>ONLINE</span></div>
    </div>

    <div class="theme-panel">
        <span style="font-size: 0.7rem; font-weight: bold; color: var(--theme);">MOTYW:</span>
        <div class="color-preview" id="colorPrev"><input type="color" id="themePicker" value="#0055FF"></div>
    </div>

    <header>
        <h1 id="mainTitle">GrandRP Finder</h1>
    </header>

    <div class="controls">
        <div class="input-group">
            <label>Serwer</label>
            <select id="serverSelect" onchange="checkCustomServer()">
                <option value="8rml8v" selected>GrandRP (PL)</option>
                <option value="z75e35">BetterSide</option>
                <option value="custom">-- Własne ID --</option>
            </select>
            <input type="text" id="customSrv" class="hidden-input" placeholder="Wpisz ID serwera">
        </div>
        <div class="input-group"><label>Szukaj ID</label><input type="number" id="sid" placeholder="np. 123" oninput="renderDebounced()"></div>
        <div class="input-group"><label>Szukaj Nicku</label><input type="text" id="snick" placeholder="np. imie" oninput="renderDebounced()"></div>
        <div class="btn-group" style="padding-top: 19px; display: flex; gap: 10px;">
            <button id="refreshBtn" onclick="manualRefresh()">ODŚWIEŻ</button>
            <button id="btnToggle" class="active" onclick="toggleList()">Ukryj listę</button>
        </div>
    </div>

    <div class="stats-bar">
        <div id="counter">Online: <strong>...</strong></div>
    </div>
    
    <div id="grid"></div>
</div>

<script>
    let players = [];
    let totalClients = 0;
    let showList = true;
    let favs = JSON.parse(localStorage.getItem('grandrp_favs')) || [];
    let renderTimeout;

    function setTheme(color) {
        document.documentElement.style.setProperty('--theme', color);
        document.documentElement.style.setProperty('--theme-glow', color + '66');
        document.getElementById('colorPrev').style.backgroundColor = color;
        localStorage.setItem('grandrp_theme', color);
    }
    document.getElementById('themePicker').addEventListener('input', (e) => setTheme(e.target.value));

    async function getData() {
        const select = document.getElementById('serverSelect');
        const custom = document.getElementById('customSrv');
        const refreshBtn = document.getElementById('refreshBtn');
        let sID = select.value === 'custom' ? custom.value : select.value;
        const title = document.getElementById('mainTitle');
        
        if (!sID) return;
        
        // Aktualizacja tytułu w zależności od wybranego serwera
        if(select.value === '8rml8v') title.innerText = "GrandRP Finder";
        else if(select.value === 'z75e35') title.innerText = "BetterSide Finder";
        else title.innerText = "Server Finder";
        
        refreshBtn.innerText = "...";
        
        const targetUrl = `https://servers-frontend.fivem.net/api/servers/single/${sID}`;
        
        const proxies = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
        ];

        let success = false;
        for (let proxy of proxies) {
            try {
                const res = await fetch(proxy);
                if (!res.ok) continue; 
                
                const data = await res.json();
                if (data && data.Data) {
                    players = data.Data.players || [];
                    totalClients = data.Data.clients || players.length;
                    success = true;
                    break;
                }
            } catch (e) {
                console.log("To proxy ma tymczasowego bana, przeskakuje na kolejne...");
            }
        }

        refreshBtn.innerText = "ODŚWIEŻ";
        if (success) render();
    }

    function manualRefresh() {
        getData();
    }

    function render() {
        const sidVal = document.getElementById('sid').value;
        const nickVal = document.getElementById('snick').value.toLowerCase();
        const grid = document.getElementById('grid');
        const counter = document.getElementById('counter');

        let filtered = players.filter(p => 
            (sidVal ? p.id.toString().includes(sidVal) : true) &&
            (nickVal ? p.name.toLowerCase().includes(nickVal) : true)
        );

        filtered.sort((a, b) => {
            let aFav = favs.includes(a.id);
            let bFav = favs.includes(b.id);
            return (aFav === bFav) ? a.id - b.id : aFav ? -1 : 1;
        });

        counter.innerHTML = `Online: <strong>${(sidVal || nickVal) ? filtered.length : totalClients}</strong>`;

        if (!showList) {
            grid.innerHTML = "";
            return;
        }

        if (players.length === 0) {
            grid.innerHTML = "<p style='grid-column:1/-1; opacity:0.5; text-align:center;'>Serwer aktualnie ukrywa listę graczy (Privacy Mode).</p>";
        } else {
            grid.innerHTML = filtered.map(p => {
                let isFav = favs.includes(p.id);
                return `
                <div class="card">
                    <div class="id-box">#${p.id}</div>
                    <div class="nick-txt">${p.name}</div>
                    <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav(${p.id})">★</button>
                </div>
                `;
            }).join('');
        }
    }

    function toggleList() {
        showList = !showList;
        const btn = document.getElementById('btnToggle');
        btn.innerText = showList ? "Ukryj listę" : "Pokaż listę";
        btn.classList.toggle('active', showList);
        render();
    }

    function toggleFav(id) {
        if (favs.includes(id)) favs = favs.filter(f => f !== id);
        else favs.push(id);
        localStorage.setItem('grandrp_favs', JSON.stringify(favs));
        render();
    }

    function renderDebounced() {
        clearTimeout(renderTimeout);
        renderTimeout = setTimeout(render, 150);
    }

    function checkCustomServer() {
        const selectVal = document.getElementById('serverSelect').value;
        document.getElementById('customSrv').style.display = selectVal === 'custom' ? 'block' : 'none';
        
        // --- ZAPISYWANIE WYBORU DO PAMIĘCI ---
        localStorage.setItem('grandrp_last_server', selectVal);
        
        getData();
    }

    // --- INICJALIZACJA PRZY WEJŚCIU NA STRONĘ ---
    const savedTheme = localStorage.getItem('grandrp_theme');
    if(savedTheme) setTheme(savedTheme);

    const savedServer = localStorage.getItem('grandrp_last_server');
    if(savedServer) {
        document.getElementById('serverSelect').value = savedServer;
        if(savedServer === 'custom') {
            document.getElementById('customSrv').style.display = 'block';
        }
    }

    // Dodatkowo zapisujemy wpisane ID własnego serwera
    document.getElementById('customSrv').addEventListener('input', (e) => {
        localStorage.setItem('grandrp_custom_id', e.target.value);
    });
    const savedCustom = localStorage.getItem('grandrp_custom_id');
    if(savedCustom) document.getElementById('customSrv').value = savedCustom;

    getData();
    setInterval(getData, 60000); 
</script>
</body>
</html>
