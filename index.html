<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Finder | Fixed</title>
    <style>
        :root { --bg: #050505; --theme: #0055FF; --theme-glow: rgba(0, 85, 255, 0.4); --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .wrapper { width: 100%; max-width: 1200px; text-align: center; }
        .status-box { background: rgba(0,0,0,0.5); border: 1px solid var(--theme); padding: 10px; border-radius: 10px; display: inline-block; margin-bottom: 20px; }
        h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; margin: 20px 0; }
        .controls { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        input, select, button { background: #000; border: 1px solid var(--theme); color: #fff; padding: 10px; border-radius: 5px; outline: none; }
        button { cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--theme); box-shadow: 0 0 15px var(--theme); }
        #counter { font-size: 2.5rem; margin: 20px 0; color: var(--theme); font-weight: bold; text-shadow: 0 0 10px var(--theme); }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; width: 100%; }
        .card { background: rgba(255,255,255,0.05); border-left: 4px solid var(--theme); padding: 15px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .loader { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="status-box">
        <div>FIVE M: <span id="f-status" style="color: #00ff88">ONLINE</span></div>
    </div>

    <h1 id="srvName">GRANDRP FINDER</h1>

    <div class="controls">
        <select id="serverSelect" onchange="getData()">
            <option value="8rml8v">GrandRP (PL)</option>
            <option value="z75e35">BetterSide</option>
            <option value="custom">-- Własne ID --</option>
        </select>
        <input type="text" id="customInput" style="display:none" placeholder="ID serwera" oninput="getData()">
        <input type="number" id="sid" placeholder="Szukaj ID" oninput="render()">
        <input type="text" id="snick" placeholder="Szukaj Nicku" oninput="render()">
        <button onclick="getData()">ODŚWIEŻ</button>
    </div>

    <div id="counter">ONLINE: <span id="countNum">0</span></div>
    <div id="statusMsg" class="loader"></div>
    <div id="grid"></div>
</div>

<script>
    let players = [];
    let totalClients = 0;

    async function getData() {
        const select = document.getElementById('serverSelect');
        const custom = document.getElementById('customInput');
        let sID = select.value === 'custom' ? custom.value : select.value;
        
        custom.style.display = select.value === 'custom' ? 'inline-block' : 'none';
        if (!sID) return;

        document.getElementById('statusMsg').innerText = "Pobieranie danych...";
        
        // Lista serwerów PROXY - jeśli jeden nie działa, próbujemy następnego
        const proxies = [
            `https://api.allorigins.win/raw?url=`,
            `https://corsproxy.io/?`
        ];

        let success = false;
        
        for (let proxy of proxies) {
            try {
                const url = `${proxy}https://servers-frontend.fivem.net/api/servers/single/${sID}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data && data.Data) {
                    players = data.Data.players || [];
                    totalClients = data.Data.clients || players.length;
                    success = true;
                    break; // Przerwij pętlę jeśli się udało
                }
            } catch (e) {
                console.error("Błąd na proxy:", proxy);
            }
        }

        if (success) {
            document.getElementById('statusMsg').innerText = "";
            render();
        } else {
            document.getElementById('statusMsg').innerText = "Błąd połączenia. Spróbuj odświeżyć za chwilę.";
            document.getElementById('countNum').innerText = "ERROR";
        }
    }

    function render() {
        const sidVal = document.getElementById('sid').value;
        const nickVal = document.getElementById('snick').value.toLowerCase();
        const grid = document.getElementById('grid');
        
        let filtered = players.filter(p => 
            (sidVal ? p.id.toString().includes(sidVal) : true) &&
            (nickVal ? p.name.toLowerCase().includes(nickVal) : true)
        );

        // Wyświetl ogólną liczbę graczy jeśli filtry są puste, inaczej liczbę znalezionych
        document.getElementById('countNum').innerText = (sidVal || nickVal) ? filtered.length : totalClients;

        if (filtered.length === 0 && players.length > 0) {
            grid.innerHTML = "<p>Nie znaleziono graczy spełniających kryteria.</p>";
        } else if (players.length === 0) {
            grid.innerHTML = "<p style='opacity:0.5'>Serwer ukrywa listę graczy (Privacy Mode), ale licznik online powyżej powinien działać.</p>";
        } else {
            grid.innerHTML = filtered.map(p => `
                <div class="card">
                    <span style="color:var(--theme); font-weight:bold;">#${p.id}</span>
                    <span style="flex:1; margin-left:15px; text-align:left;">${p.name}</span>
                </div>
            `).join('');
        }
    }

    // Automatyczny start
    getData();
    // Odświeżaj co 40 sekund (nie za często, by nie dostać bana na IP)
    setInterval(getData, 40000);
</script>

</body>
</html>
